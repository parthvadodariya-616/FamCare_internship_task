name: fam_care
description: FamCARE — Multi-Service Home Healthcare Bulk Scheduler

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management — Riverpod
  flutter_riverpod: ^2.5.1

  # HTTP client — Dio
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  # Icons
  flutter_tabler_icons: ^1.0.1

  # Date formatting
  intl: ^0.19.0

  # UUID
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: TablerIcons
      fonts:
        - asset: assets/fonts/tabler-icons.ttf
  assets:
    - assets/fonts/
